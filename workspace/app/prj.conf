# Enable C++ support if WAMR requires it internally
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# Standard C Library (Newlib required for WASI features)
CONFIG_NEWLIB_LIBC=y

# Memory management (WASM requires dynamic allocation)
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=8192

# Enable WAMR (assumes the wamr module is in Zephyr's west workspace)
# Note: depending on the Zephyr version and how WAMR is integrated,
# this might be named CONFIG_WASM or CONFIG_WAMR.
# CONFIG_WASM=y

# Networking and POSIX support for WASI sockets
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# File system for WASI
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Network dummy to avoid slip.sock error
CONFIG_NET_LOOPBACK=y
CONFIG_NET_QEMU_SLIP=n
