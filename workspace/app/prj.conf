# Enable C++ support if WAMR requires it internally
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# Standard C Library (Newlib required for WASI features)
CONFIG_NEWLIB_LIBC=y

# Memory management (WASM requires dynamic allocation)
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=8192

# Enable WAMR (assumes the wamr module is in Zephyr's west workspace)
# Note: depending on the Zephyr version and how WAMR is integrated,
# this might be named CONFIG_WASM or CONFIG_WAMR.
# CONFIG_WASM=y

# Networking and POSIX support for WASI sockets
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# File system for WASI
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Networking: Enable Ethernet & QEMU User Networking (SLIRP / NAT)
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_ARP=y

# Assegnazione di un IP fittizio NAT alla board (QEMU default SLIRP router: 10.0.2.2)
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="10.0.2.15"
CONFIG_NET_CONFIG_MY_IPV4_GW="10.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"

# Abilita driver Ethernet nativo per QEMU
CONFIG_NET_QEMU_ETHERNET=y

# Attiva il socket SLIP virtuale verso l'host
# CONFIG_NET_QEMU_SLIP=y
CONFIG_PCIE=y
CONFIG_ETH_E1000=y
CONFIG_NET_QEMU_USER=y
# CONFIG_NET_LOOPBACK=y
CONFIG_NET_TCP=y
